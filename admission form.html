<!DOCTYPE html>
<html>
<head>
    <title>College Admission Form</title>
</head>
<body>

    <h2>College Admission Form</h2>

    <form>

        <label>Student Name:</label><br>
        <input type="text" name="studentName" required><br><br>

        <label>Father's Name:</label><br>
        <input type="text" name="fatherName" required><br><br>

        <label>Email:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Contact Number:</label><br>
        <input type="tel" name="contactNumber" required><br><br>

        <label>Course Selection:</label><br>
        <select name="course" required>
            <option value="">--Select Course--</option>
            <option>BCA</option>
            <option>B.Sc Computer Science</option>
            <option>B.Com</option>
            <option>BBA</option>
            <option>BA English</option>
            <option>MCA </option>
            <option>MBA </option>
        </select><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Other"> Other
        <br><br>

        <label>Address:</label><br>
        <textarea name="address" rows="4" cols="30"></textarea><br><br>

        <input type="submit" value="Submit">

    </form>

</body>
</html>
